name: Supabase Backup

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Supabase data
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TABLES="athletes exercise_logs readiness_logs weight_logs meal_logs messages personal_records weeks sessions exercises meet_plans warmup_templates exercise_library"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H%M')

          for TABLE in $TABLES; do
            echo "Fetching $TABLE..."
            curl -sf \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Accept: application/json" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=1000000" \
              > "/tmp/table_${TABLE}.json" || echo "[]" > "/tmp/table_${TABLE}.json"
          done

          echo '{}' > /tmp/combined.json
          for TABLE in $TABLES; do
            jq --slurpfile data "/tmp/table_${TABLE}.json" --arg t "$TABLE" \
              '. + {($t): $data[0]}' /tmp/combined.json > /tmp/combined_new.json
            mv /tmp/combined_new.json /tmp/combined.json
          done

          cp /tmp/combined.json /tmp/backup.json
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "Row counts:"
          jq 'to_entries[] | "\(.key): \(.value | length)"' /tmp/backup.json

          # Fejl-vagt: afbryd hvis kerne-tabellen athletes kom tom hjem (hentning fejlede),
          # så vi aldrig overskriver/markerer en tom backup som vellykket. GitHub mailer
          # dig automatisk når dette workflow fejler.
          ATHLETE_COUNT=$(jq '.athletes | length' /tmp/backup.json)
          echo "athletes: ${ATHLETE_COUNT}"
          if [ "${ATHLETE_COUNT:-0}" -lt 1 ]; then
            echo "::error::Backup afbrudt: athletes-tabellen er tom — hentningen fejlede sandsynligvis."
            exit 1
          fi

      - name: Push to backup branch via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          FILENAME="backups/backup-${TIMESTAMP}.json"

          BRANCH_EXISTS=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/git/refs/heads/backup" && echo "yes" || echo "no")

          if [ "$BRANCH_EXISTS" = "no" ]; then
            echo "Creating backup branch..."
            MAIN_SHA=$(curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/git/refs/heads/main" | jq -r '.object.sha')
            curl -sf -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/git/refs" \
              -d "{\"ref\":\"refs/heads/backup\",\"sha\":\"${MAIN_SHA}\"}"
          fi

          base64 -w 0 /tmp/backup.json > /tmp/content.b64
          jq -n \
            --rawfile content /tmp/content.b64 \
            --arg msg "backup ${TIMESTAMP}" \
            --arg branch "backup" \
            '{message: $msg, content: ($content | rtrimstr("\n")), branch: $branch}' > /tmp/payload.json

          curl -sf -X PUT \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/contents/${FILENAME}" \
            --data @/tmp/payload.json

          echo "Done: ${FILENAME}"
