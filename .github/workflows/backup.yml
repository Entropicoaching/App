name: Supabase Backup

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Supabase data
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TABLES="athletes exercise_logs readiness_logs weight_logs meal_logs messages personal_records weeks sessions exercises meet_plans warmup_templates exercise_library"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H%M')
          COMBINED='{}'

          for TABLE in $TABLES; do
            echo "Fetching $TABLE..."
            DATA=$(curl -sf \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Accept: application/json" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=1000000" || echo "[]")
            COMBINED=$(echo "$COMBINED" | jq --argjson data "$DATA" --arg t "$TABLE" '. + {($t): $data}')
          done

          echo "$COMBINED" | jq '.' > "/tmp/backup.json"
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "Row counts:"
          echo "$COMBINED" | jq 'to_entries[] | "\(.key): \(.value | length)"'

      - name: Push to backup branch via GitHub API
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          FILENAME="backups/backup-${TIMESTAMP}.json"
          CONTENT=$(base64 -w 0 /tmp/backup.json)

          # Ensure backup branch exists
          BRANCH_EXISTS=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/git/refs/heads/backup" && echo "yes" || echo "no")

          if [ "$BRANCH_EXISTS" = "no" ]; then
            echo "Creating backup branch..."
            MAIN_SHA=$(curl -sf \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/git/refs/heads/main" | jq -r '.object.sha')
            curl -sf -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/git/refs" \
              -d "{\"ref\":\"refs/heads/backup\",\"sha\":\"${MAIN_SHA}\"}"
          fi

          # Upload backup file
          echo "Uploading ${FILENAME}..."
          jq -n \
            --arg msg "backup ${TIMESTAMP}" \
            --arg content "$CONTENT" \
            --arg branch "backup" \
            '{message: $msg, content: $content, branch: $branch}' > /tmp/payload.json

          curl -sf -X PUT \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/contents/${FILENAME}" \
            --data @/tmp/payload.json

          echo "Backup pushed: ${FILENAME}"

          # Delete backups older than 30 days
          CUTOFF=$(date -u -d '30 days ago' '+%Y-%m-%dT%H%M')
          FILES=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPO}/contents/backups?ref=backup" | jq -r '.[] | .name' || echo "")

          for NAME in $FILES; do
            FILETS=$(echo "$NAME" | sed 's/backup-//' | sed 's/.json//')
            if [[ "$FILETS" < "$CUTOFF" ]]; then
              echo "Deleting old backup: $NAME"
              FILE_SHA=$(curl -sf \
                -H "Authorization: token ${GH_TOKEN}" \
                "https://api.github.com/repos/${REPO}/contents/backups/${NAME}?ref=backup" | jq -r '.sha')
              curl -sf -X DELETE \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/${REPO}/contents/backups/${NAME}" \
                -d "{\"message\":\"remove old backup ${NAME}\",\"sha\":\"${FILE_SHA}\",\"branch\":\"backup\"}"
            fi
          done
