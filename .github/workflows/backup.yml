name: Supabase Backup

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Debug environment
        shell: bash
        run: |
          set -x
          echo "Runner OS: $RUNNER_OS"
          echo "bash version: $BASH_VERSION"
          which git && git --version
          which curl && curl --version | head -1
          which jq && jq --version
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "Token present: ${{ secrets.GITHUB_TOKEN != '' }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tables
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -x
          TABLES="athletes exercise_logs readiness_logs weight_logs meal_logs messages personal_records weeks sessions exercises meet_plans warmup_templates exercise_library"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H%M')
          COMBINED='{}'

          for TABLE in $TABLES; do
            echo "Fetching $TABLE..."
            DATA=$(curl -sf \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Accept: application/json" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=1000000" || echo "[]")
            COMBINED=$(echo "$COMBINED" | jq --argjson data "$DATA" --arg t "$TABLE" '. + {($t): $data}')
          done

          echo "$COMBINED" | jq '.' > "/tmp/backup-${TIMESTAMP}.json"
          echo "BACKUP_FILE=/tmp/backup-${TIMESTAMP}.json" >> "$GITHUB_ENV"
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "Row counts:"
          echo "$COMBINED" | jq 'to_entries[] | "\(.key): \(.value | length)"'

      - name: Commit to backup branch
        shell: bash
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin backup > /dev/null 2>&1; then
            git fetch origin backup
            git checkout backup
          else
            git checkout --orphan backup
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p backups
          cp "$BACKUP_FILE" "backups/backup-${TIMESTAMP}.json"

          CUTOFF=$(date -u -d '30 days ago' '+%Y-%m-%dT%H%M')
          for FILE in backups/backup-*.json; do
            [ -f "$FILE" ] || continue
            FILETS=$(basename "$FILE" .json | sed 's/backup-//')
            if [[ "$FILETS" < "$CUTOFF" ]]; then
              rm -f "$FILE"
            fi
          done

          git add backups/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "backup ${TIMESTAMP}"
            git push origin backup
          fi
