name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tables and create backup
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
        run: |
          set -euo pipefail
          DATE=$(date -u '+%Y-%m-%d')
          TABLES=(athletes exercise_logs readiness_logs weight_logs meal_logs messages personal_records weeks sessions exercises)
          mkdir -p backups

          COMBINED='{}'
          for TABLE in "${TABLES[@]}"; do
            echo "Fetching $TABLE..."
            DATA=$(curl -sf \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Accept: application/json" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=1000000")
            COMBINED=$(jq -n \
              --argjson existing "$COMBINED" \
              --argjson data "$DATA" \
              --arg t "$TABLE" \
              '$existing + {($t): $data}')
          done

          echo "$COMBINED" | jq '.' > "backups/backup-${DATE}.json"
          echo "Backup created: backups/backup-${DATE}.json"

      - name: Remove backups older than 30 days
        run: |
          CUTOFF=$(date -u -d '30 days ago' '+%Y-%m-%d')
          for FILE in backups/backup-*.json; do
            [ -f "$FILE" ] || continue
            FILEDATE=$(basename "$FILE" .json | sed 's/backup-//')
            if [[ "$FILEDATE" < "$CUTOFF" ]]; then
              echo "Removing old backup: $FILE (${FILEDATE} < ${CUTOFF})"
              git rm -f "$FILE"
            fi
          done

      - name: Commit and push
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: daily backup ${DATE}"
            git push
          fi
